name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (enables caching and advanced build features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and Push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gdrive-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gdrive-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Auto-Deploy Job
  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            # Pindah ke direktori proyek di server
            cd /home/deployer/gdrive-laravel-projects

            # Login ke Docker Hub (jika repo private)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull image terbaru
            docker compose -f docker-compose.prod.yml pull

            # Restart container dengan file konfigurasi produksi
            docker compose -f docker-compose.prod.yml up -d

            # Fix Permissions & Missing Directories (Jalankan sebagai root di host/container)
            # Ini diperlukan karena volume 'gdrive-app' bersifat persistent dan mungkin menyimpan state lama
            docker exec -t gdrive-service mkdir -p /app/storage/logs /app/storage/framework/{sessions,views,cache} /app/resources/views
            docker exec -t gdrive-service chown -R www-data:www-data /app/storage /app/bootstrap/cache /app/resources/views
            docker exec -t gdrive-service chmod -R 775 /app/storage /app/bootstrap/cache

            # Maintenance task di dalam container (Gunakan user www-data)
            docker exec --user www-data -t gdrive-service php artisan migrate --force
            docker exec --user www-data -t gdrive-service php artisan optimize:clear
            docker exec --user www-data -t gdrive-service php artisan optimize
