name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (enables caching and advanced build features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build and Push Docker image
      # The image will be tagged with 'latest' and the git commit SHA.
      # It also uses GitHub Actions caching to speed up subsequent builds.
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gdrive-laravel:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gdrive-laravel:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

