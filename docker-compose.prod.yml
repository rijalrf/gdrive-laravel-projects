version: "3.8"

services:
  # PHP-FPM Service (Application)
  gdrive-service:
    image: ${DOCKERHUB_USERNAME}/gdrive-service:latest
    container_name: gdrive-service
    restart: always
    expose:
      - "9000"
    env_file: .env
    volumes:
      - gdrive-app:/app
    networks:
      - mkas-net

  # Nginx Service (Web Server)
  gdrive-nginx:
    image: nginx:alpine
    container_name: gdrive-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-8095}:80"
    volumes:
      - gdrive-app:/app:ro
    # Mengambil config nginx dari dalam volume app yang sudah di-mount
    command: /bin/sh -c "cp /app/.docker/nginx/default.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - mkas-net
    depends_on:
      - gdrive-service

  # Queue Worker
  gdrive-worker:
    image: ${DOCKERHUB_USERNAME}/gdrive-service:latest
    container_name: gdrive-worker
    restart: always
    env_file: .env
    command: php artisan queue:work --tries=3 --delay=3
    networks:
      - mkas-net
    depends_on:
      - gdrive-service

networks:
  mkas-net:
    name: mkas-laravel_default
    external: true

volumes:
  gdrive-app:
