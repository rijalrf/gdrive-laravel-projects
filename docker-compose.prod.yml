services:
  # PHP-FPM Service (Application)
  gdrive-service:
    image: ${DOCKERHUB_USERNAME}/gdrive-service:latest
    container_name: gdrive-service
    restart: always
    expose:
      - "9000"
    env_file: .env
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gdrive-app:/app
    networks:
      - shared-network

  # Nginx Service (Web Server)
  gdrive-nginx:
    image: nginx:alpine
    container_name: gdrive-nginx
    restart: always
    ports:
      - "${NGINX_PORT:-8095}:80"
    volumes:
      - gdrive-app:/app:ro
    # Mengambil config nginx dari dalam volume app yang sudah di-mount
    command: /bin/sh -c "cp /app/.docker/nginx/default.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - shared-network
    depends_on:
      - gdrive-service

  # Queue Worker
  gdrive-worker:
    image: ${DOCKERHUB_USERNAME}/gdrive-service:latest
    container_name: gdrive-worker
    restart: always
    env_file: .env
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: php artisan queue:work --tries=3 --delay=3
    networks:
      - shared-network
    depends_on:
      - gdrive-service

networks:
  shared-network:
    name: laravel-shared-network
    external: true

volumes:
  gdrive-app:
